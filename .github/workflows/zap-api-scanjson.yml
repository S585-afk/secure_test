name: API Security Scan (Postman Collection)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  zap-api-scan:
    runs-on: ubuntu-latest

    steps:

    # 1️⃣ Checkout Code
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2️⃣ Run ZAP API Scan Using Postman Collection
    - name: Run ZAP API Scan
      uses: zaproxy/action-api-scan@v0.10.0
      with:
        target: 'postman/trackier_collection.json'
        format: postman
        fail_action: false
        cmd_options: >
          -a
          -z "
          -config replacer.full_list(0).description=api-key
          -config replacer.full_list(0).enabled=true
          -config replacer.full_list(0).matchtype=REQ_HEADER
          -config replacer.full_list(0).matchstr=X-Api-Key
          -config replacer.full_list(0).replacement=${{ secrets.TRACKIER_API_KEY }}
          "

    # 3️⃣ Upload Report
    - name: Upload ZAP Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: zap-report
        path: |
          report_html.html
          report_json.json
          report_md.md
