name: API Security with Authenticated ZAP

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:

    # 1️⃣ Checkout Repository
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2️⃣ Sanity Check – Call API
    - name: Call FraudRules API using curl
      run: |
        curl -i --location 'https://api.trackier.com/v2/fraudrules' \
        --header "X-Api-Key: ${{ secrets.TRACKIER_API_KEY }}" \
        --header "Accept: application/json"

    # 3️⃣ Run ZAP Baseline Scan (FIXED VERSION)
      
    - name: Run ZAP Baseline Scan
      uses: zaproxy/action-baseline@v0.8.0
      with:
        docker_name: 'ghcr.io/zaproxy/zaproxy:2.13.0'
        target: 'https://api.trackier.com/v2/fraudrules'
        fail_action: false
        cmd_options: >
          -a
          -z "
          -config replacer.full_list(0).description=api-key
          -config replacer.full_list(0).enabled=true
          -config replacer.full_list(0).matchtype=REQ_HEADER
          -config replacer.full_list(0).matchstr=X-Api-Key
          -config replacer.full_list(0).replacement=${{ secrets.TRACKIER_API_KEY }}
          "

    # 4️⃣ Upload ZAP Report (Always Upload Even if Scan Fails)
    - name: Upload ZAP Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: zap-report
        path: report_html.html
