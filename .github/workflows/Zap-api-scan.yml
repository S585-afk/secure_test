name: ZAP API Security Scan - Trackier

on:
  workflow_dispatch:

jobs:
  zap-api-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run ZAP API Scan
        uses: zaproxy/action-api-scan@v0.10.0
        with:
          target: 'postman/trackier_openapi.json'
          format: openapi
          fail_action: false
          cmd_options: >
            -a
            -z "
            -config replacer.full_list(0).description=api-key
            -config replacer.full_list(0).enabled=true
            -config replacer.full_list(0).matchtype=REQ_HEADER
            -config replacer.full_list(0).matchstr=X-Api-Key
            -config replacer.full_list(0).replacement=${{ secrets.TRACKIER_API_KEY }}
            "

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            report_html.html
            report_json.json
            report_md.md
